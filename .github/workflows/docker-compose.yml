name: Docker Compose CI

permissions: {}

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  docker-compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Validate Compose config
        run: docker compose config
